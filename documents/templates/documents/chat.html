<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pyet AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="{% url 'dashboard' %}" class="navbar-brand">StudentAI</a>

        <div class="d-flex gap-2">
            <a href="{% url 'document_detail' document.id %}" class="btn btn-outline-light btn-sm">
                Shiko Dokumentin
            </a>

            <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">
                Dashboard
            </a>
        </div>
    </div>
</nav>

<main class="container mt-5">
    <div class="d-flex flex-wrap gap-2 mb-3">
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="history.back()">
            Kthehu mbrapa
        </button>

        <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">
            Home
        </a>
    </div>

    <h2>Pyet AI per dokumentin</h2>
    <p><strong>Dokumenti:</strong> {{ document.title }}</p>

    <form method="POST" id="question-form">
        {% csrf_token %}

        <textarea
            id="question"
            name="question"
            class="form-control"
            rows="4"
            placeholder="Shkruaj pyetjen ketu..."
        >{{ question }}</textarea>

        <div class="d-flex flex-wrap gap-2 mt-3">
            <button class="btn btn-success" type="submit">
                Pyet AI
            </button>

            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                Kthehu te Dashboard
            </a>
        </div>
    </form>

    {% if answer %}
        <div class="card mt-4">
            <div class="card-header">
                Pergjigjja e AI
            </div>
            <div class="card-body">
                {{ answer }}
            </div>
        </div>
    {% endif %}
</main>

<script>
    const questionInput = document.getElementById('question');

    questionInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            questionInput.form.requestSubmit();
        }
    });
</script>

</body>
</html>
