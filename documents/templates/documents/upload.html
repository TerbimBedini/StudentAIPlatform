<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            StudentAI
        </a>

        <a href="{% url 'logout' %}" class="btn btn-danger">
            Logout
        </a>
    </div>
</nav>

<main class="container mt-5">
    <div class="d-flex flex-wrap gap-2 mb-3">
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="history.back()">
            Kthehu mbrapa
        </button>

        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">
            Dashboard
        </a>

        <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">
            Home
        </a>
    </div>

    <div class="d-flex justify-content-between align-items-center gap-3">
        <h1 class="mb-0">Upload Document</h1>

        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
            Kthehu
        </a>
    </div>

    <p class="text-muted mt-3">
        Ngarko PDF ose DOCX per te nxjerre tekstin automatikisht.
    </p>

    <form method="POST" enctype="multipart/form-data" class="mt-4">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Upload
        </button>
    </form>
</main>

</body>
</html>
