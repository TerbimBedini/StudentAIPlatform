<!DOCTYPE html>
<html>
<head>

    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="{% url 'home' %}" class="navbar-brand">StudentAI</a>

        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
            Login
        </a>
    </div>
</nav>

<main class="container mt-5">

    </button>

    <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">

<h1>Register</h1>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Register
    </button>

</form>

</main>

</body>
</html>
