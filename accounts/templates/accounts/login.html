<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="{% url 'home' %}" class="navbar-brand">StudentAI</a>

        <a href="{% url 'register' %}" class="btn btn-outline-light btn-sm">
            Register
        </a>
    </div>
</nav>

<main class="container mt-5">
<div class="d-flex flex-wrap gap-2 mb-3">
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="history.back()">
        Kthehu mbrapa
    </button>

    <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">
        Home
    </a>
</div>

<h1>Login</h1>

{% if error_message %}
    <p style="color: red;">{{ error_message }}</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Username"
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</main>

</body>
</html>
